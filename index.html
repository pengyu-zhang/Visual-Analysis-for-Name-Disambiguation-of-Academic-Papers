<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Visual Analysis for Name Disambiguation of Academic Papers</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header id="topbar">
    <div id="brand" data-i18n="appTitle">Name Disambiguation Visual Analysis</div>
    <div id="query-bar">
      <select id="author-select" title="Author"></select>
      <select id="start-year" title="Start year"></select>
      <select id="end-year" title="End year"></select>
      <button id="btn-search" class="primary" data-i18n="search">Search</button>
      <button id="btn-reset" data-i18n="reset">Reset</button>
      <button id="btn-import" data-i18n="importCsv">Import CSV</button>
      <input type="file" id="file-input" accept=".csv" hidden>
      <button id="btn-export" data-i18n="exportCsv">Export CSV</button>
    </div>
    <button id="btn-lang" title="Language">中文</button>
  </header>

  <main id="layout">
    <section id="panel-association" class="panel">
      <div class="panel-title" data-i18n="associationDegree">Association Degree</div>
      <div id="assoc-metrics">
        <button class="metric-btn active" data-metric="overall" data-i18n="metricOverall">Overall</button>
        <button class="metric-btn" data-metric="copub" data-i18n="metricCoPub">Co-publication</button>
        <button class="metric-btn" data-metric="direction" data-i18n="metricDirection">Direction</button>
      </div>
      <div id="dumbbell-container"></div>
      <div id="assoc-legend">
        <span class="legend-item"><span class="dot big"></span><span data-i18n="legendAssoc">association score</span></span>
        <span class="legend-item"><span class="dot small"></span><span data-i18n="legendPubs">publication score</span></span>
      </div>
    </section>

    <section id="panel-center" class="panel">
      <div id="center-tabs" class="tab-row">
        <button class="tab active" data-tab="collaboration" data-i18n="collaboration">Collaboration</button>
        <button class="tab" data-tab="analysis" data-i18n="analysisMode">Analysis Mode</button>
        <button id="btn-fullscreen" class="tab-action" data-i18n="fullscreen">Full Screen</button>
      </div>
      <div id="network-container" class="center-view"></div>
      <div id="analysis-container" class="center-view" hidden></div>
      <div id="direction-legend"></div>
    </section>

    <section id="panel-journals" class="panel">
      <div class="panel-title" data-i18n="publicationJournals">Publication Journals</div>
      <div id="sankey-container"></div>
    </section>

    <section id="panel-info" class="panel">
      <div class="tab-row">
        <button class="tab active" data-tab="papers" data-i18n="paperData">Paper Data</button>
        <button class="tab" data-tab="author" data-i18n="authorInfo">Author Info</button>
        <button class="tab" data-tab="journal" data-i18n="journalInfo">Journal Info</button>
      </div>
      <div id="info-papers" class="info-view"></div>
      <div id="info-author" class="info-view" hidden></div>
      <div id="info-journal" class="info-view" hidden></div>
    </section>
  </main>

  <div id="fullscreen-modal" hidden>
    <div id="fs-header">
      <span data-i18n="fullscreenTitle">Collaboration — Full Screen</span>
      <button id="btn-close-fullscreen" data-i18n="close">Close</button>
    </div>
    <div id="fs-body">
      <div id="fs-papers" class="fs-side">
        <div class="panel-title" data-i18n="relatedPapers">Related Papers</div>
        <div id="fs-papers-list"></div>
      </div>
      <div id="fs-network"></div>
      <div id="fs-strong" class="fs-side">
        <div class="panel-title" data-i18n="strongLinks">Strong Links</div>
        <div id="fs-strong-list"></div>
      </div>
    </div>
  </div>

  <ul id="context-menu" hidden>
    <li id="ctx-split" data-i18n="ctxSplit">Split author (add nodes)</li>
    <li id="ctx-delete" data-i18n="ctxDelete">Delete node</li>
    <li id="ctx-analysis" data-i18n="ctxAnalysis">Enter analysis mode</li>
  </ul>

  <div id="tooltip" hidden></div>

  <script src="vendor/d3.v7.min.js"></script>
  <script src="vendor/d3-sankey.min.js"></script>
  <script src="vendor/d3.layout.cloud.js"></script>
  <script src="js/config.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/csv.js"></script>
  <script src="js/colors.js"></script>
  <script src="js/pipeline.js"></script>
  <script src="js/state.js"></script>
  <script src="js/query.js"></script>
  <script src="js/dumbbell.js"></script>
  <script src="js/network.js"></script>
  <script src="js/sankey.js"></script>
  <script src="js/yearbars.js"></script>
  <script src="js/wordcloud.js"></script>
  <script src="js/radar.js"></script>
  <script src="js/tabs.js"></script>
  <script src="js/analysis.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
