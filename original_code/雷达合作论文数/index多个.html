<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Document</title>
</head>

<body>
  <div id="demo"></div>
</body>
<script src="https://cdn.zoomcharts-cloud.com/1/latest/zoomcharts.js"></script>
<!-- Styles -->
<style>
  #chartdiv {
    width: 100%;
    height: 500px;
  }
  
  </style>
  
  <!-- Resources -->
  <script src="https://cdn.amcharts.com/lib/4/core.js"></script>
  <script src="https://cdn.amcharts.com/lib/4/charts.js"></script>
  <script src="https://cdn.amcharts.com/lib/4/themes/animated.js"></script>
  
  <!-- Chart code -->
  <script>
  am4core.ready(function() {
  
  // Themes begin
  am4core.useTheme(am4themes_animated);
  // Themes end
  
  var chart = am4core.create("chartdiv", am4charts.RadarChart);
  chart.hiddenState.properties.opacity = 0; // this creates initial fade-in
  
  var label = chart.createChild(am4core.Label);
  label.text = "Drag slider to change radius";
  label.exportable = false;
  
  chart.data = [
    {
      category: "One",
      value1: 8,
      value2: 2,
    },
    {
      category: "Two",
      value1: 11,
      value2: 4,
    },
    {
      category: "Three",
      value1: 7,
      value2: 6,
    },
    {
      category: "Four",
      value1: 13,
      value2: 8,
    },
    {
      category: "Five",
      value1: 12,
      value2: 10,
    },
    {
      category: "Six",
      value1: 15,
      value2: 12,
    },
    {
      category: "Seven",
      value1: 9,
      value2: 14,
    },
    {
      category: "Eight",
      value1: 6,
      value2: 16,
    },
    {
      category: "Nine",
      value1: 9,
      value2: 14,
    },
    {
      category: "Ten",
      value1: 9,
      value2: 14,
    }
  ];
  chart.radius = am4core.percent(95);
  chart.startAngle = 270 - 180;
  chart.endAngle = 270 + 180;
  chart.innerRadius = am4core.percent(60);
  
  var categoryAxis = chart.xAxes.push(new am4charts.CategoryAxis());
  categoryAxis.dataFields.category = "category";
  categoryAxis.renderer.labels.template.location = 0.5;
  categoryAxis.renderer.grid.template.strokeOpacity = 0.1;
  categoryAxis.renderer.axisFills.template.disabled = true;
  categoryAxis.mouseEnabled = false;
  
  var valueAxis = chart.yAxes.push(new am4charts.ValueAxis());
  valueAxis.tooltip.disabled = true;
  valueAxis.renderer.grid.template.strokeOpacity = 0.05;
  valueAxis.renderer.axisFills.template.disabled = true;
  valueAxis.renderer.axisAngle = 260;
  valueAxis.renderer.labels.template.horizontalCenter = "right";
  valueAxis.min = 0;
  
  var series1 = chart.series.push(new am4charts.RadarColumnSeries());
  series1.columns.template.radarColumn.strokeOpacity = 1;
  series1.name = "Series 1";
  series1.dataFields.categoryX = "category";
  series1.columns.template.tooltipText = "{name}: {valueY.value}";
  series1.dataFields.valueY = "value1";
  series1.stacked = true;
  
  var series2 = chart.series.push(new am4charts.RadarColumnSeries());
  series2.columns.template.radarColumn.strokeOpacity = 1;
  series2.columns.template.tooltipText = "{name}: {valueY.value}";
  series2.name = "Series 2";
  series2.dataFields.categoryX = "category";
  series2.dataFields.valueY = "value2";
  series2.stacked = true;
  
  var series3 = chart.series.push(new am4charts.RadarColumnSeries());
  series3.columns.template.radarColumn.strokeOpacity = 1;
  series3.columns.template.tooltipText = "{name}: {valueY.value}";  
  series3.name = "Series 3";
  series3.dataFields.categoryX = "category";
  series3.dataFields.valueY = "value3";
  series3.stacked = true;
  
  var series4 = chart.series.push(new am4charts.RadarColumnSeries());
  series4.columns.template.radarColumn.strokeOpacity = 1;
  series4.columns.template.tooltipText = "{name}: {valueY.value}";
  series4.name = "Series 4";
  series4.dataFields.categoryX = "category";
  series4.dataFields.valueY = "value4";
  series4.stacked = true;
  
  chart.seriesContainer.zIndex = -1;
  
  var slider = chart.createChild(am4core.Slider);
  slider.start = 0.5;
  slider.exportable = false;
  slider.events.on("rangechanged", function() {
    var start = slider.start;
  
    chart.startAngle = 270 - start * 179 - 1;
    chart.endAngle = 270 + start * 179 + 1;
  
    valueAxis.renderer.axisAngle = chart.startAngle;
  });
  
  }); // end am4core.ready()
  </script>
  
  <!-- HTML -->
  <div id="chartdiv"></div>

</html>
