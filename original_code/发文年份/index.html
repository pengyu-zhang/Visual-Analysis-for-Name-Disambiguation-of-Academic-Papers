  am4core.ready(function() {
  
  // Themes begin
  am4core.useTheme(am4themes_animated);
  // Themes end
  
    // Create chart instance
    var container = am4core.create("chartdiv", am4core.Container);
    container.layout = "grid";
    container.fixedWidthGrid = false;
    container.width = am4core.percent(50);
    container.height = am4core.percent(100);
  
    // Color set
    var colors = new am4core.ColorSet();
  

  
    function createColumn(title, data, color) {
  
      var chart = container.createChild(am4charts.XYChart);
      chart.width = am4core.percent(70);
      chart.height = 70;
  
      chart.data = data;
  
      chart.titles.template.fontSize = 15;
      chart.titles.template.textAlign = "left";
      chart.titles.template.isMeasured = false;
      chart.titles.create().text = title;
  
      chart.padding(20, 115, 2, 115);
  
      var dateAxis = chart.xAxes.push(new am4charts.DateAxis());
      dateAxis.renderer.grid.template.disabled = true;
      dateAxis.renderer.labels.template.disabled = true;
      dateAxis.cursorTooltipEnabled = false;
  
      var valueAxis = chart.yAxes.push(new am4charts.ValueAxis());
      valueAxis.min = 0;
      valueAxis.renderer.grid.template.disabled = true;
      valueAxis.renderer.baseGrid.disabled = true;
      valueAxis.renderer.labels.template.disabled = true;
      valueAxis.cursorTooltipEnabled = false;
  
      chart.cursor = new am4charts.XYCursor();
      chart.cursor.lineY.disabled = true;
  
      var series = chart.series.push(new am4charts.ColumnSeries());
      series.tooltipText = "年份{date}， 发文数[bold]{value}";
      series.dataFields.dateX = "date";
      series.dataFields.valueY = "value";
      series.strokeWidth = 0;
      series.fillOpacity = 0.5;
      series.columns.template.propertyFields.fillOpacity = "opacity";
      series.columns.template.fill = color;
  
      return chart;
    }
