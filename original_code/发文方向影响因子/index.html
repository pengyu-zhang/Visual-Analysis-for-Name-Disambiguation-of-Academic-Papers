var svg = d3.select("body").append("svg").attr("width", 660).attr("height", 1000);


var g =[svg.append("g").attr("transform","translate(105,30)")];

var bp=[ viz.bP()
		.data(data)
		.min(12)
		.pad(1)
		.height(950)
		.width(150)
		.barSize(25)
		.fill(d=>color[d.primary])];
		
[0,1].forEach(function(i){
	g[i].call(bp[i])
	
	g[i].append("text").attr("x",-50).attr("y",-8).style("text-anchor","middle").text("人名");
	g[i].append("text").attr("x", 200).attr("y",-8).style("text-anchor","middle").text("期刊名");
	
	g[i].append("line").attr("x1",-100).attr("x2",0);
	g[i].append("line").attr("x1",150).attr("x2",250);
	
	g[i].selectAll(".mainBars")
		.on("mouseover",mouseover)
		.on("mouseout",mouseout);

	g[i].selectAll(".mainBars").append("text").attr("class","label")
		.attr("x",d=>(d.part=="primary"? -20: 20))
		.attr("y",d=>+6)
		.text(d=>d.key)
		.attr("text-anchor",d=>(d.part=="primary"? "end": "start"));
	

});

function mouseover(d){
	[0,1].forEach(function(i){
		bp[i].mouseover(d);
		
		g[i].selectAll(".mainBars").select(".perc")
		.text(function(d){ return d3.format("  0.0%")(d.percent)});
	});
}
function mouseout(d){
	[0,1].forEach(function(i){
		bp[i].mouseout(d);
		
		g[i].selectAll(".mainBars").select(".perc")
		.text(function(d){ return d3.format("  0.0%")(d.percent)});
	});
}
d3.select(self.frameElement).style("height", "600px");
