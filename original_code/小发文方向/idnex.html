<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="jquery.min.js"></script>
    <script src="echarts.js"></script>
    <title>Document</title>
    <style>
        body,
        html {
            margin: 0px;
            padding: 0px;
            width: 100vw;
            height: 100vh;
        }

        #echarts-div {
            width: 100%;
            height: 100%;
        }
    </style>
</head>

<body>
    <div id="echarts-div"></div>
</body>
<script>
    var myChart = echarts.init(document.getElementById('echarts-div'));
    option = {
        legend: {},
        tooltip: {
            trigger: 'axis',
            showContent: false
        },
        dataset: {
            source: [
                ['product', '2012', '2013', '2014', '2015', '2016', '2017'],
                ['Milk Tea', 56.5, 82.1, 88.7, 70.1, 53.4, 85.1],
                ['Matcha Latte', 51.1, 51.4, 55.1, 53.3, 73.8, 68.7],
                ['Cheese Cocoa', 40.1, 62.2, 69.5, 36.4, 45.2, 32.5],
                ['Walnut Brownie', 25.2, 37.1, 41.2, 18, 33.9, 49.1]
            ]
        },
        xAxis: { type: 'category' },
        yAxis: { gridIndex: 0 },
        grid: { top: '30', left: "5%", bottom: '30', width: "40%" },
        // textStyle: {
        //     fontStyle: 'Times New Roman',
        //     fontSize: "15px"
        // },
        series: [
            { type: 'bar', smooth: true, seriesLayoutBy: 'row', emphasis: { focus: 'series' } },
            { type: 'bar', smooth: true, seriesLayoutBy: 'row', emphasis: { focus: 'series' } },
            { type: 'bar', smooth: true, seriesLayoutBy: 'row', emphasis: { focus: 'series' } },
            { type: 'bar', smooth: true, seriesLayoutBy: 'row', emphasis: { focus: 'series' } },
            {
                type: 'pie',
                id: 'pie',
                radius: '40%',
                center: ['75%', '50%'],
                emphasis: { focus: 'data' },
                // label: {
                //     normal: {

                //         formatter: '{b}: {@2012} ({d}%)',
                //         rich: {
                //             name: {
                //                 fontSize: 20,
                //                 padding: [0, 10, 0, 4],
                //                 color: '#666666',
                //                 fontStyle: 'Times New Roman'
                //             },
                //             value: {
                //                 fontSize: 20,
                //                 fontWeight: 'bold',
                //                 color: '#333333',
                //                 fontStyle: 'Times New Roman'
                //             }
                //         }
                //     }
                // },

                label: {
                    normal: {
                        formatter: params => {
                            return (
                                '{name|' + params.name + '}{value|' +
                                params.value + '}'
                            );
                        },
                        // padding: [0, -100, 25, -100],
                        rich: {
                            // icon: {
                            //     fontSize: 16
                            // },
                            name: {
                                fontSize: 11,
                                fontStyle:'Times New Roman',
                                padding: [0, 10, 0, 4],
                                color: '#666666'
                            },
                            value: {
                                fontSize: 11,
                                fontStyle:'Times New Roman',
                                fontWeight: 'bold',
                                color: '#333333'
                            }
                        }
                    }
                },
                encode: {
                    itemName: 'product',
                    value: '2012',
                    tooltip: '2012'
                },
            }
        ]
    };

    myChart.on('updateAxisPointer', function (event) {
        var xAxisInfo = event.axesInfo[0];
        if (xAxisInfo) {
            var dimension = xAxisInfo.value + 1;
            myChart.setOption({
                series: {
                    id: 'pie',
                    label: {
                        formatter: '{b}: {@[' + dimension + ']} ({d}%)'
                    },
                    encode: {
                        value: dimension,
                        tooltip: dimension
                    }
                }
            });
        }
    });

    myChart.setOption(option);

</script>

</html>
