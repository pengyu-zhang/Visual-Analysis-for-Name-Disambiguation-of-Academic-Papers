<!-- Code from d3-graph-gallery.com -->
<!DOCTYPE html>
<meta charset="utf-8">

<!-- Load d3.js -->
<script src="https://d3js.org/d3.v4.js"></script>


<!-- Create a div where the graph will take place -->
<div id="my_dataviz"></div>


<script>

// set the dimensions and margins of the graph
var margin = {top: 0, right: 60, bottom: 0, left: 140},
    width = 380 - margin.left - margin.right,
    height = 1100 - margin.top - margin.bottom;

// append the svg object to the body of the page
var svg = d3.select("#my_dataviz")
  .append("svg")
    .attr("width", width + margin.left + margin.right)
    .attr("height", height + margin.top + margin.bottom)
  .append("g")
    .attr("transform",
          "translate(" + margin.left + "," + margin.top + ")");

// Parse the Data
d3.csv("合作发文 - 副本.csv", function(data) {

// sort data
data.sort(function(b, a) {
  return b.Value - a.Value;
});

// Add X axis
var x = d3.scaleLinear()
  .domain([0, 30])
  .range([ 0, width]);
svg.append("g")
  .attr("transform", "translate(0," + height + ")")
  .call(d3.axisBottom(x))
  .selectAll("text")
    .attr("transform", "translate(-10,0)rotate(-45)")
    .style("text-anchor", "end")
    .style("font-size", 1);

// Y axis
var y = d3.scaleBand()
  .range([ 0, height ])
  .domain(data.map(function(d) { return d.Country; }))
  .padding(1);
svg.append("g")
  .style("font-size", 18)
  .style("font-family", "Times New Roman")
  .call(d3.axisLeft(y))


  // Color scale: give me a specie name, I return a color
  var color = d3.scaleOrdinal()
    .domain(["Jinpei Cheng", "Ao Yu", "Chen Yang", 'Xiaosong Xue', 'Xin Li',
            'Shu Chien', 'Runsheng Chen', 'Yongfei Zheng', 'YanYan Zhao', 'Lifei Zhang',
            'Ligang Zhou', 'Yingming Sheng', 'Xiachen Zhi', 'Weidong Sun', 'Bin Fu',
            'Jochen Hoefs', 'Shan Gao', 'Fukun Chen', 'Yueheng Yang', 'Lihong Chen', 
            'Zongyao Wen', 'Weibo Ka', 'Ding-Yu Lee', 'Si-Shen Feng', 'Ying Wang', 
            'Yan-Ting Shiu', 'Sung Sik Hur', 'Yuhui Jiang', 'Li-Jing Chen'])
    .range([ "#ADD8E6", "#DAA520", "#9ACD32", '#7FFFD4', '#20B2AA',
            '#32CD32', '#FFE4C4', '#FA8072', '#6A5ACD', '#8A2BE2',
            '#A52A2A', '#DEB887', '#5F9EA0', '#FF6347', '#D2691E',
            '#FF7F50', '#6495ED', '	#00FF7F', '#DC143C', '#00FFFF',
            '#00008B', '#008B8B', '#B8860B', '#006400', '#BDB76B',
            '#FF8C00', '#9932CC', '#8B0000', '#E9967A'])


// Lines
svg.selectAll("myline")
  .data(data)
  .enter()
  .append("line")
    .attr("x1", x(0))
    .attr("x2", x(0))
    .attr("y1", function(d) { return y(d.Country); })
    .attr("y2", function(d) { return y(d.Country); })
    .attr("stroke", "grey")

// Circles -> start at X=0
svg.selectAll("mycircle")
  .data(data)
  .enter()
  .append("circle")
    .attr("cx", x(0) )
    .attr("cy", function(d) { return y(d.Country); })
    .attr("r", "15")
    .style("fill", function (d) { return color(d.Country) } )
    .attr("stroke", "#000000")

// Change the X coordinates of line and circle
svg.selectAll("circle")
  .transition()
  .duration(2000)
  .attr("cx", function(d) { return x(d.Value); })

svg.selectAll("line")
  .transition()
  .duration(2000)
  .attr("x1", function(d) { return x(d.Value); })

})

</script>
