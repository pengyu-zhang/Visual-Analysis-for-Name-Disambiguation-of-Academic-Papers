<!-- Code from d3-graph-gallery.com -->
<!DOCTYPE html>
<meta charset="utf-8">

<!-- Load d3.js -->
<script src="https://d3js.org/d3.v4.js"></script>


<!-- Create a div where the graph will take place -->
<div id="my_dataviz"></div>


<script>

// set the dimensions and margins of the graph
var margin = {top: 0, right: 0, bottom: 0, left: 130},
    width = 430 - margin.left - margin.right,
    height = 670 - margin.top - margin.bottom;

// append the svg object to the body of the page
var svg = d3.select("#my_dataviz")
  .append("svg")
    .attr("width", width + margin.left + margin.right)
    .attr("height", height + margin.top + margin.bottom)
  .append("g")
    .attr("transform",
          "translate(" + margin.left + "," + margin.top + ")");

// Parse the Data
d3.csv("合作期刊.csv", function(data) {

// sort data
data.sort(function(b, a) {
  return a.Value - b.Value;
});

// Add X axis
var x = d3.scaleLinear()
  .domain([0, 30])
  .range([ 0, width]);
svg.append("g")
  .attr("transform", "translate(0," + height + ")")
  .call(d3.axisBottom(x))
  .selectAll("text")
    .attr("transform", "translate(-10,0)rotate(-45)")
    .style("text-anchor", "end")
    .style("font-size", 1);

// Y axis
var y = d3.scaleBand()
  .range([ 0, height ])
  .domain(data.map(function(d) { return d.Country; }))
  .padding(1);
svg.append("g")
  .style("font-size", 16)
  .call(d3.axisLeft(y))


  // Color scale: give me a specie name, I return a color
  var color = d3.scaleOrdinal()
    .domain(["Teacher-C:1003", "Teacher-B:1002", "Teacher-D:1004", 'Teacher-E:1005', 'Teacher-F:1006',  'Teacher-G:1007', 'Teacher-H:1008', 'Teacher-I:1009', 'Teacher-J:1010', 'Teacher-K:1011', 'Teacher-L:1012', 'Teacher-M:1013'])
    .range([ "#109618", "#FF9900", "#990099", '#9F79EE', '#3366FF', '#DC3912', '#C4C4C4', '#8B3626', '#218868', '#0099C6', '#EE9572', '#B2DFEE'])


// Lines
svg.selectAll("myline")
  .data(data)
  .enter()
  .append("line")
    .attr("x1", x(0))
    .attr("x2", x(0))
    .attr("y1", function(d) { return y(d.Country); })
    .attr("y2", function(d) { return y(d.Country); })
    .attr("stroke", "grey")

// Circles -> start at X=0
svg.selectAll("mycircle")
  .data(data)
  .enter()
  .append("circle")
    .attr("cx", x(0) )
    .attr("cy", function(d) { return y(d.Country); })
    .attr("r", "15")
    .style("fill", function (d) { return color(d.Country) } )
    .attr("stroke", "#69b3a2")

// Change the X coordinates of line and circle
svg.selectAll("circle")
  .transition()
  .duration(2000)
  .attr("cx", function(d) { return x(d.Value); })

svg.selectAll("line")
  .transition()
  .duration(2000)
  .attr("x1", function(d) { return x(d.Value); })

})

</script>
